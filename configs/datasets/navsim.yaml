dataset: navsim
split: val
max_samples: 10
root: ${NAVSIM_ROOT}
candidate_pool:
  nominal: true
  speed_scaled: [0.75, 1.0, 1.25]
  lateral_shift: [-1.0, 0.0, 1.0]
  curvature_perturbed: [-0.02, 0.0, 0.02]
  horizon_steps: 6
  seed: 0
notes:
  official_wrapper_required: true
  no_fake_metrics: true
